name: TEMP AI BUILDER

on:
  push:
    paths:
      - "Temporary Builder/memory/convo.md"
      - "Temporary Builder/memory/convo2.md"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: install
        run: npm install

      - name: run builder
        run: node "Temporary Builder/Builder/runner.js"
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: commit
        run: |
          git config user.name "AI-BOT"
          git config user.email "bot@ai.dev"
          git add .
          git commit -m "🧠 DAG AUTO BUILD" || echo "no changes"
          git push
