name: TEMP AI BUILDER (MASTER SYSTEM)

on:
  push:
    paths:
      - "Temporary Builder/**"
      - "convo.md"
      - "convo2.md"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install node-fetch || true

      - name: Run Builder
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: node "Temporary Builder/Builder/runner.js"

      - name: Commit changes
        run: |
          git config user.name "ai-builder"
          git config user.email "ai@bot.local"
          git add .
          git commit -m "🧠 TEMP BUILDER AUTO SYNC" || true
          git push || true
