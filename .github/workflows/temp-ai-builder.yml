name: TEMP AI BUILDER - FINAL

on:
  push:
    paths:
      - "Temporary Builder/memory/**"
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install
        run: |
          cd "Temporary Builder"
          npm install

      - name: Run Builder
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: node "Temporary Builder/Builder/runner.js"

      - name: Auto Commit
        run: |
          git config user.name "AI-BOT"
          git config user.email "ai@bot.local"
          git add .
          git diff --staged --quiet || git commit -m "🧠 AUTO BUILD"
          git pull --rebase origin main || true
          git push origin main || true
