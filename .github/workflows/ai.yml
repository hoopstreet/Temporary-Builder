name: AI Builder

on:
  push:
    paths:
      - "memory/convo.md"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install deps
        run: npm install node-fetch@2

      - name: Run AI
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: node src/agent/brain.js

      - name: Commit AI output
        run: |
          git config --global user.name "AI"
          git config --global user.email "ai@bot.com"
          git add .
          git commit -m "AI generated output" || echo "No changes"
          git push
